spring.datasource.url=jdbc:h2:mem:kolog-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.highlight_sql=false

jwt.secret=test-jwt-secret-must-be-at-least-32-bytes
file.upload-dir=${java.io.tmpdir}/kolog-test-storage/
file.server-url=http://localhost:8080
app.cors.allowed-origins=http://localhost:3000
