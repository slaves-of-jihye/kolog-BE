spring.application.name=kolog-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.properties.hibernate.highlight_sql=${HIBERNATE_HIGHLIGHT_SQL:false}

jwt.secret=${JWT_SECRET}

# 파일을 실제로 저장할 하드디스크 경로
file.upload-dir=${FILE_UPLOAD_DIR:/tmp/kolog_storage/}
# 외부에서 접근할 때 사용할 서버 주소 (로컬 테스트용)
file.server-url=${FILE_SERVER_URL:http://localhost:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
