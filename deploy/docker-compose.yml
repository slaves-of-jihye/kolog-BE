services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: kolog-be:latest
    container_name: kolog-be
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL:?DB_URL must be set in deploy/.env}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME must be set in deploy/.env}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in deploy/.env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in deploy/.env}
      FILE_UPLOAD_DIR: ${FILE_UPLOAD_DIR:-/app/storage/}
      FILE_SERVER_URL: ${FILE_SERVER_URL:-http://localhost:8001}
    ports:
      - "8001:8080"
    volumes:
      - kolog-storage:/app/storage
    networks:
      - kolog-network

networks:
  kolog-network:
    driver: bridge

volumes:
  kolog-storage:
